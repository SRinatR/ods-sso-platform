services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ods}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ods_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-ods_sso}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ods} -d ${POSTGRES_DB:-ods_sso}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ods}:${POSTGRES_PASSWORD:-ods_dev_password}@postgres:5432/${POSTGRES_DB:-ods_sso}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/ready"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:8080}
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:8080}
    depends_on:
      backend:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      API_DOMAIN: ${API_DOMAIN:-localhost}
      ACCOUNT_DOMAIN: ${ACCOUNT_DOMAIN:-account.localhost}
      ACME_EMAIL: ${ACME_EMAIL:-admin@ods.uz}
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

