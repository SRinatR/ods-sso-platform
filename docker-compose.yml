services:
  postgres:
    image: postgres:18.4-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ods}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ods_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-ods_sso}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ods} -d ${POSTGRES_DB:-ods_sso}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:8.6.3-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    build:
      context: ./infra/minio
      args:
        MINIO_VERSION: RELEASE.2025-10-15T17-29-55Z
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" &&
        mc mb --ignore-existing "local/$${MINIO_BUCKET}" &&
        mc version enable "local/$${MINIO_BUCKET}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-ods-backups}
    depends_on:
      minio:
        condition: service_healthy

  minio-client:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    profiles: ["tools"]
    entrypoint: ["/bin/sh"]
    environment:
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-ods-backups}
      BACKUP_S3_ENDPOINT: ${BACKUP_S3_ENDPOINT:-}
      BACKUP_S3_ACCESS_KEY: ${BACKUP_S3_ACCESS_KEY:-}
      BACKUP_S3_SECRET_KEY: ${BACKUP_S3_SECRET_KEY:-}
      BACKUP_S3_BUCKET: ${BACKUP_S3_BUCKET:-}
    volumes:
      - ${BACKUP_DIR:-/var/backups/ods-platform}:/backup

  kafka:
    image: apache/kafka:4.3.0
    profiles: ["events"]
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  backend:
    build: ./backend-kotlin
    restart: unless-stopped
    mem_limit: 768m
    cpus: ${BACKEND_CPUS:-1.0}
    cpuset: ${BACKEND_CPUSET:-0}
    env_file: ${RUNTIME_ENV_FILE:-.env}
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ods_sso}
      REDIS_URL: redis://redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_EVENTS_ENABLED: ${KAFKA_EVENTS_ENABLED:-false}
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4318/v1/traces}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/ready"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.154.0
    profiles: ["observability"]
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yml"]
    volumes:
      - ./observability/otel-collector.yml:/etc/otelcol-contrib/config.yml:ro
    ports:
      - "4317:4317"
      - "4318:4318"

  prometheus:
    image: prom/prometheus:v3.12.0
    profiles: ["observability"]
    restart: unless-stopped
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      backend:
        condition: service_healthy

  grafana:
    image: grafana/grafana:13.0.2
    profiles: ["observability"]
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-before-production}
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  frontend:
    restart: unless-stopped
    mem_limit: 384m
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:8080}
        NEXT_PUBLIC_ROOT_URL: ${ROOT_URL:-http://localhost}
        NEXT_PUBLIC_AUTH_URL: ${ACCOUNT_URL:-http://account.localhost}
        NEXT_PUBLIC_ACCOUNTS_URL: ${ACCOUNTS_URL:-http://accounts.localhost}
        NEXT_PUBLIC_ADMIN_URL: ${ADMIN_URL:-http://admin.localhost}
        NEXT_PUBLIC_PARTNERS_URL: ${PARTNERS_URL:-http://partners.localhost}
        NEXT_PUBLIC_ROOT_DOMAIN: ${ROOT_DOMAIN:-localhost}
    environment:
      NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:8080}
      NEXT_PUBLIC_ROOT_URL: ${ROOT_URL:-http://localhost}
      NEXT_PUBLIC_AUTH_URL: ${ACCOUNT_URL:-http://account.localhost}
      NEXT_PUBLIC_ACCOUNTS_URL: ${ACCOUNTS_URL:-http://accounts.localhost}
      NEXT_PUBLIC_ADMIN_URL: ${ADMIN_URL:-http://admin.localhost}
      NEXT_PUBLIC_PARTNERS_URL: ${PARTNERS_URL:-http://partners.localhost}
      NEXT_PUBLIC_ROOT_DOMAIN: ${ROOT_DOMAIN:-localhost}
    depends_on:
      backend:
        condition: service_healthy

  caddy:
    image: caddy:2.11.1-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile.production:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      API_DOMAIN: ${API_DOMAIN:-localhost}
      ACCOUNT_DOMAIN: ${ACCOUNT_DOMAIN:-accounts.localhost}
      ADMIN_DOMAIN: ${ADMIN_DOMAIN:-admin.localhost}
      ACME_EMAIL: ${ACME_EMAIL:-admin@ods.uz}
      DOCS_DOMAIN: ${DOCS_DOMAIN:-docs.localhost}
      PARTNER_DOMAIN: ${PARTNER_DOMAIN:-partners.localhost}
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-localhost}
      ROOT_DOMAIN: ${ROOT_DOMAIN:-localhost}
      SCIM_DOMAIN: ${SCIM_DOMAIN:-scim.localhost}
      SSO_DOMAIN: ${SSO_DOMAIN:-sso.localhost}
      STATUS_DOMAIN: ${STATUS_DOMAIN:-status.localhost}
      WEBHOOKS_DOMAIN: ${WEBHOOKS_DOMAIN:-webhooks.localhost}
      WWW_DOMAIN: ${WWW_DOMAIN:-www.localhost}
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  redis_data:
  minio_data:
  kafka_data:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:
