name: Promote production

on:
  workflow_run:
    workflows:
      - Quality Gate
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: promote-production
  cancel-in-progress: true

jobs:
  create-promotion:
    name: Create main to prod PR
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Create or reuse production promotion PR
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ahead_by="$(
            gh api "repos/$GITHUB_REPOSITORY/compare/prod...main" --jq '.ahead_by'
          )"
          if [ "$ahead_by" -eq 0 ]; then
            echo "prod already contains main"
            exit 0
          fi

          existing="$(
            gh pr list \
              --repo "$GITHUB_REPOSITORY" \
              --base prod \
              --head main \
              --state open \
              --json url \
              --jq '.[0].url // empty'
          )"
          if [ -n "$existing" ]; then
            echo "Promotion PR already exists: $existing"
            exit 0
          fi

          body_file="$RUNNER_TEMP/production-promotion.md"
          cat > "$body_file" <<'EOF'
          ## Production promotion

          This PR promotes the current verified `main` branch to `prod`.

          After merge:

          1. `Quality Gate` runs against the exact `prod` commit.
          2. A successful gate automatically starts `Deploy production`.
          3. The deploy creates a pre-release backup, applies Flyway migrations,
             starts the Compose/systemd stack, and verifies public endpoints.
          EOF

          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base prod \
            --head main \
            --title "Promote main to production" \
            --body-file "$body_file"
