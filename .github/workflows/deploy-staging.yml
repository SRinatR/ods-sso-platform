name: Deploy Staging

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout validated revision
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Backup server environment
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            mkdir -p "${{ secrets.DEPLOY_PATH }}"
            if [ -f "${{ secrets.DEPLOY_PATH }}/.env" ]; then
              cp "${{ secrets.DEPLOY_PATH }}/.env" /tmp/ods-platform.env.bak
            fi

      - name: Copy validated release
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: "."
          target: ${{ secrets.DEPLOY_PATH }}
          rm: true
          overwrite: true

      - name: Deploy and validate
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            if [ -f /tmp/ods-platform.env.bak ]; then
              mv /tmp/ods-platform.env.bak .env
            fi
            test -f .env
            cp -f Caddyfile.staging Caddyfile
            docker compose up -d --build --remove-orphans
            docker compose exec -T backend alembic current
            for attempt in $(seq 1 30); do
              if curl --fail --silent https://staging.api.ods.uz/ready; then
                exit 0
              fi
              sleep 5
            done
            docker compose logs --tail=200 backend
            exit 1

