name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - name: Lint
        run: ruff check app scripts tests
      - name: Format check
        run: ruff format --check app scripts tests
      - name: Typecheck
        run: mypy app scripts tests --no-incremental

  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sso_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sso_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    defaults:
      run:
        working-directory: backend
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/sso_test
      TEST_REDIS_URL: redis://127.0.0.1:6379/15
      ENV: test
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/sso_test
      REDIS_URL: redis://127.0.0.1:6379/15
      SESSION_SECRET: ci-session-secret-with-more-than-32-characters
      TOKEN_PEPPER: ci-token-pepper-with-more-than-32-characters
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - name: Unit and integration tests with backend coverage
        run: >-
          pytest -q
          --cov=app
          --cov-branch
          --cov-report=xml
          --cov-fail-under=80
      - name: Auth and OAuth service coverage
        run: >-
          pytest -q
          --cov=app.services.identity
          --cov=app.services.mfa
          --cov=app.services.oauth
          --cov=app.services.session
          --cov-branch
          --cov-fail-under=90
      - name: OAuth flow tests
        run: pytest -q -m oauth
      - name: Security tests
        run: pytest -q -m security
      - name: Generate and verify OpenAPI
        run: |
          python -m scripts.export_openapi
          git diff --exit-code -- openapi.json

  migration-validation:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sso_migrations
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d sso_migrations"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    defaults:
      run:
        working-directory: backend
    env:
      ENV: test
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/sso_migrations
      SESSION_SECRET: ci-session-secret-with-more-than-32-characters
      TOKEN_PEPPER: ci-token-pepper-with-more-than-32-characters
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Upgrade, downgrade and restore schema
        run: |
          alembic upgrade head
          alembic current
          alembic downgrade base
          alembic upgrade head

  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --no-audit --no-fund
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Production build
        run: npm run build

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - uses: gitleaks/gitleaks-action@v2

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - backend-quality
      - backend-tests
      - migration-validation
      - frontend-quality
      - secret-scan
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: false
          tags: ods-sso-backend:ci
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: false
          tags: ods-sso-frontend:ci
