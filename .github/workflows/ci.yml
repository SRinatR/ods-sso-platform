name: Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - codex/**

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "26"

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' }}

      - name: Verify backend and coverage
        working-directory: backend-kotlin
        run: ./gradlew --no-daemon check bootJar

      - name: Upload JaCoCo report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend-kotlin/build/reports/jacoco/test

      - name: Require Docker 26+
        shell: bash
        run: |
          version="$(docker version --format '{{.Server.Version}}')"
          major="${version%%.*}"
          if [ "${major}" -lt 26 ]; then
            echo "Docker 26+ is required, found ${version}" >&2
            exit 1
          fi

      - name: Build CDS-trained production image
        run: docker build --tag ods-sso-backend:ci backend-kotlin

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Verify frontend
        working-directory: frontend
        run: |
          npm run lint
          npm run typecheck
          npm run build
