spring:
  application:
    name: ods-sso
  threads:
    virtual:
      enabled: true
  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://postgres:5432/ods_sso}
    username: ${POSTGRES_USER:ods}
    password: ${POSTGRES_PASSWORD:ods_dev_password}
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:20}
      minimum-idle: 2
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      url: ${REDIS_URL:redis://redis:6379/0}
      timeout: 500ms
      repositories:
        enabled: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        enable.idempotence: true
        acks: all
  mail:
    host: ${SMTP_HOST:}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.starttls.enable: ${SMTP_STARTTLS:true}

server:
  port: 8000
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        name: ODS_HTTP_SESSION
        http-only: true
        same-site: lax

management:
  otlp:
    metrics:
      export:
        enabled: ${OTLP_METRICS_ENABLED:false}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  tracing:
    sampling:
      probability: ${TRACING_SAMPLE_RATE:0.1}
  opentelemetry:
    tracing:
      export:
        otlp:
          endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://otel-collector:4318/v1/traces}

logging:
  structured:
    format:
      console: logstash
  level:
    org.springframework.security: INFO

springdoc:
  api-docs:
    path: /openapi.json
  swagger-ui:
    path: /docs
    operations-sorter: method

ods:
  environment: ${ENV:dev}
  issuer: ${ISSUER:http://localhost:8080}
  account-url: ${ACCOUNT_URL:http://account.localhost}
  api-url: ${API_URL:http://localhost:8080}
  allowed-origins: ${ALLOWED_ORIGINS:http://account.localhost,http://localhost:3000}
  session-secret: ${SESSION_SECRET:dev-session-secret-change-before-production-123}
  token-pepper: ${TOKEN_PEPPER:dev-token-pepper-change-before-production-456}
  encryption-key: ${TOTP_ENCRYPTION_KEY:}
  jwt-private-key: ${JWT_PRIVATE_KEY:}
  jwt-public-key: ${JWT_PUBLIC_KEY:}
  jwt-key-id: ${JWT_KEY_ID:ods-platform-1}
  session-ttl: ${SESSION_TTL:2592000}
  verification-token-ttl: ${VERIFICATION_TOKEN_TTL:86400}
  password-reset-token-ttl: ${PASSWORD_RESET_TOKEN_TTL:3600}
  preauth-token-ttl: ${PREAUTH_TOKEN_TTL:300}
  step-up-ttl: ${STEP_UP_TTL:600}
  access-token-ttl: ${ACCESS_TOKEN_TTL:900}
  refresh-token-ttl: ${REFRESH_TOKEN_TTL:2592000}
  require-email-verification: ${REQUIRE_EMAIL_VERIFICATION:true}
  bootstrap-admin-email: ${BOOTSTRAP_ADMIN_EMAIL:}
  bootstrap-admin-password: ${BOOTSTRAP_ADMIN_PASSWORD:}
  tatarlar-client-secret: ${TATARLAR_CLIENT_SECRET:}
  kafka-events-enabled: ${KAFKA_EVENTS_ENABLED:false}
  default-tenant: ${DEFAULT_TENANT:default}
  trusted-proxy-count: ${TRUSTED_PROXY_COUNT:0}
